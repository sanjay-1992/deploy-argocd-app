kind: Application
metadata:
  name: springboot-multisource1
  namespace: argocd
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  sources:

    - repoURL: https://github.com/sanjay-1992/deploy-argocd-app.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/sanjay-1992/springboot-helm-chart/
      chart: springboot
      targetRevision: 0.1.5
      helm:
        valueFiles:
          - $values/deploy/dev/values.yaml
